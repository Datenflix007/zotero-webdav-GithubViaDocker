<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyLiteratureVault</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="mark"></div>
      <div>
        <strong>MyLiteratureVault</strong>
        <span id="repoName">Repository</span>
      </div>
      <button id="sidebarToggle" title="Sidebar einklappen">←</button>
    </div>
    <nav>
      <button class="nav active" data-view="graph">Graph</button>
      <button class="nav" data-view="issues">TODOs</button>
      <button class="nav" data-view="pulls">Pull Requests</button>
    </nav>
    <div class="sidebar-footer">
      <button id="pullBtn">Pull</button>
      <button id="commitBtn">Commit</button>
      <button id="settingsBtn">Settings</button>
      <button id="stopServerBtn" class="btn-danger">Server stoppen</button>
    </div>
  </aside>

  <div class="resize-handle" id="resizeHandle"></div>

  <main>
    <header class="topbar">
      <div>
        <h1 id="viewTitle">Source Control Graph</h1>
        <p id="statusLine">Lade Status...</p>
      </div>
      <div class="badges">
        <span id="branchBadge">branch</span>
        <span id="syncBadge">sync</span>
      </div>
    </header>

    <section id="graphView" class="view active">
      <div class="panel graph-panel">
        <div class="panel-head">
          <h2>Commit Verlauf</h2>
          <button id="refreshGraph">Refresh</button>
        </div>
        <div id="commitGraph" class="commit-graph"></div>
      </div>
    </section>

    <section id="issuesView" class="view">
      <div class="panel">
        <div class="panel-head">
          <h2>TODOs</h2>
          <div class="panel-head-right">
            <label class="filter-label">
              <input type="checkbox" id="showClosedTodos"> Erledigte anzeigen
            </label>
            <button id="newTodoBtn">+ Neues TODO</button>
            <button id="refreshIssues">Refresh</button>
          </div>
        </div>
        <div id="issuesList" class="cards"></div>
      </div>
    </section>

    <section id="pullsView" class="view">
      <div class="panel">
        <div class="panel-head">
          <h2>Pull Requests</h2>
          <button id="refreshPulls">Refresh</button>
        </div>
        <div id="pullsList" class="cards"></div>
      </div>
    </section>
  </main>

  <dialog id="newTodoDialog">
    <div class="dialog-body">
      <h2>Neues TODO</h2>
      <label>Titel <span class="required">*</span>
        <input id="newTodoTitle" placeholder="Was ist zu tun?">
      </label>
      <label>Beschreibung
        <textarea id="newTodoBody" rows="5" placeholder="Details, Links, Notizen..."></textarea>
      </label>
      <div class="dialog-actions">
        <button type="button" id="newTodoCancelBtn">Abbrechen</button>
        <button type="button" id="newTodoSaveBtn">Erstellen</button>
      </div>
    </div>
  </dialog>

  <dialog id="commitDialog">
    <form method="dialog" class="dialog-body">
      <h2>Manueller Commit</h2>
      <label>Commit-Nachricht
        <textarea id="commitMessage" rows="3"></textarea>
      </label>
      <label class="label-inline">
        <input type="checkbox" id="commitPush" checked>
        Auch zu GitHub pushen
      </label>
      <div class="dialog-actions">
        <button type="button" id="commitCancelBtn">Abbrechen</button>
        <button type="button" id="commitSaveBtn">Committen</button>
      </div>
    </form>
  </dialog>

  <dialog id="editDialog">
    <form method="dialog" class="dialog-body">
      <h2 id="editTitle">Bearbeiten</h2>
      <input type="hidden" id="editType">
      <input type="hidden" id="editNumber">
      <label>Titel<input id="editItemTitle"></label>
      <label>Text<textarea id="editItemBody" rows="8"></textarea></label>
      <label>Status
        <select id="editItemState">
          <option value="open">Offen</option>
          <option value="closed">Erledigt</option>
        </select>
      </label>
      <div class="dialog-actions">
        <button value="cancel">Abbrechen</button>
        <button id="saveItemBtn" value="default">Speichern</button>
      </div>
    </form>
  </dialog>

  <dialog id="settingsDialog">
    <form method="dialog" class="dialog-body">
      <h2>Einstellungen</h2>
      <label>GitHub Name<input id="githubUsername" autocomplete="username"></label>
      <label>GitHub Email<input id="githubEmail" autocomplete="email"></label>
      <label>GitHub Token<input id="githubToken" type="password" placeholder="leer lassen = behalten"></label>
      <label>WebDAV URL<input id="webdavUrl"></label>
      <label>WebDAV Benutzer<input id="webdavUsername"></label>
      <label>WebDAV Passwort<input id="webdavPassword" type="password"></label>
      <div class="hint" id="tokenHint"></div>
      <div class="dialog-actions">
        <button value="cancel">Abbrechen</button>
        <button id="saveSettingsBtn" value="default">Speichern</button>
      </div>
    </form>
  </dialog>

  <div id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
